name: Daily digest pipeline

on:
  schedule:
    # 01:30 UTC ≈ 07:00 IST. GitHub disables schedules after 60 days without
    # repo activity — re-enable from the Actions tab if that happens.
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: digest-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache embedding model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-minilm-l6-v2-q8

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline
        run: pnpm pipeline:run
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
